<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Iota Engine internal architecture</title>
  <desc id="desc">Internal components of IotaEngine and their dependencies.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 24px Arial,sans-serif;fill:#101828}.small{font:13px Arial,sans-serif;fill:#475467}.box{rx:12;fill:#fff;stroke:#98a2b3;stroke-width:1.5}.engine{fill:#fee2e2}.core{fill:#eff6ff}.store{fill:#dcfce7}.adapter{fill:#f2f4f7}.label{font:700 15px Arial,sans-serif;fill:#101828}.sub{font:12px Arial,sans-serif;fill:#475467}.edge{stroke:#344054;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="46" y="48">Engine 内部结构</text>
  <text class="small" x="46" y="74">IotaEngine 负责编排执行；BackendPool 负责后端适配；RedisStorage、RedisConfigStore、RedisVisibilityStore 共同形成持久化与可观测性平面。</text>
  <rect class="box engine" x="560" y="118" width="280" height="70"/><text class="label" x="644" y="148">IotaEngine</text><text class="sub" x="603" y="169">stream / execute / interrupt / gc</text>
  <rect class="box core" x="105" y="260" width="190" height="64"/><text class="label" x="139" y="287">Config</text><text class="sub" x="126" y="307">loadConfig + RedisConfigStore</text>
  <rect class="box core" x="330" y="260" width="190" height="64"/><text class="label" x="369" y="287">Events</text><text class="sub" x="349" y="307">store + multiplexer</text>
  <rect class="box core" x="555" y="260" width="190" height="64"/><text class="label" x="602" y="287">BackendPool</text><text class="sub" x="588" y="307">resolver + circuit breaker</text>
  <rect class="box core" x="780" y="260" width="190" height="64"/><text class="label" x="823" y="287">Visibility</text><text class="sub" x="805" y="307">collector + Redis store</text>
  <rect class="box core" x="1005" y="260" width="190" height="64"/><text class="label" x="1051" y="287">Memory</text><text class="sub" x="1028" y="307">dialogue + unified Redis</text>
  <rect class="box core" x="218" y="390" width="190" height="64"/><text class="label" x="270" y="417">Approval</text><text class="sub" x="244" y="437">policy + hook</text>
  <rect class="box core" x="443" y="390" width="190" height="64"/><text class="label" x="494" y="417">Workspace</text><text class="sub" x="464" y="437">scan + snapshot + delta</text>
  <rect class="box core" x="668" y="390" width="190" height="64"/><text class="label" x="724" y="417">MCP</text><text class="sub" x="700" y="437">router + stdio client</text>
  <rect class="box core" x="893" y="390" width="190" height="64"/><text class="label" x="943" y="417">Audit</text><text class="sub" x="922" y="437">logger + metrics</text>
  <rect class="box store" x="330" y="570" width="230" height="64"/><text class="label" x="403" y="597">Redis</text><text class="sub" x="358" y="617">sessions / events / config / memory</text>
  <rect class="box adapter" x="620" y="570" width="140" height="64"/><text class="label" x="646" y="597">Claude</text><text class="sub" x="646" y="617">NDJSON</text>
  <rect class="box adapter" x="790" y="570" width="140" height="64"/><text class="label" x="821" y="597">Codex</text><text class="sub" x="819" y="617">NDJSON</text>
  <rect class="box adapter" x="960" y="570" width="140" height="64"/><text class="label" x="998" y="597">Gemini</text><text class="sub" x="990" y="617">stream-json</text>
  <rect class="box adapter" x="1130" y="570" width="140" height="64"/><text class="label" x="1160" y="597">Hermes</text><text class="sub" x="1160" y="617">ACP RPC</text>
  <path class="edge" d="M620 188 L220 260"/><path class="edge" d="M650 188 L438 260"/><path class="edge" d="M700 188 L650 260"/><path class="edge" d="M745 188 L855 260"/><path class="edge" d="M780 188 L1075 260"/>
  <path class="edge" d="M660 188 L332 390"/><path class="edge" d="M685 188 L548 390"/><path class="edge" d="M720 188 L768 390"/><path class="edge" d="M750 188 L990 390"/>
  <path class="edge" d="M200 324 C230 460 330 520 420 570"/><path class="edge" d="M425 324 C430 450 438 515 445 570"/><path class="edge" d="M875 324 C790 430 610 515 490 570"/><path class="edge" d="M1100 324 C930 430 660 520 510 570"/>
  <path class="edge" d="M650 324 C650 430 665 510 690 570"/><path class="edge" d="M670 324 C715 430 785 515 860 570"/><path class="edge" d="M695 324 C780 430 900 515 1030 570"/><path class="edge" d="M720 324 C860 430 1030 515 1200 570"/>
</svg>
