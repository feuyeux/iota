version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: iota-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  redis-sentinel:
    image: redis:7-alpine
    container_name: iota-redis-sentinel
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    volumes:
      - ./redis-sentinel.conf:/etc/redis/sentinel.conf
      - sentinel-data:/data
    depends_on:
      - redis
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: iota-minio
    environment:
      MINIO_ROOT_USER: iota
      MINIO_ROOT_PASSWORD: iotasecret
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - iota-minio-data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
  sentinel-data:
  iota-minio-data:

networks:
  default:
    name: iota-network
